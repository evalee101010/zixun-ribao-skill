  - name: Sensor Tower 博客
    board: 泛娱乐·出海
    track: 其他
    type: web
    url: "https://sensortower.com/blog/rss"
    enabled: true
  - name: 快出海-报告
    board: 泛娱乐·出海
    track: 其他
    type: web
    url: "https://www.kchuhai.com/"
    note: "出海数据报告聚合，定期人工看"
    enabled: false

# ============================================================
# 关键词过滤：标题/正文命中任一关键词才纳入（降噪）
# 想更宽松就清空 include。exclude 命中则剔除。
# ============================================================
keywords:
  include:
    - 出海
    - 游戏
    - 短剧
    - 漫剧
    - 网文
    - 社交
    - dating
    - AI
    - 大模型
    - 融资
    - 估值
    - 财报
    - 下载
    - 流水
    - DAU
    - MAU
    - IPO
  exclude:
    - 招聘
    - 课程报名
    - 直播预告
    # —— 具身/机器人方向：现阶段先不看 ——
    - 具身
    - 人形
    - 机械臂
    - 机器狗
    - 四足
    - 双足
    - 灵巧手
    - 仿生
    - 宇树
    - 智元
    - 机器人
  # 保护词：含这些短语时不因"机器人"被误杀（其实是AI助手/对话产品）
  exclude_protect:
    - 聊天机器人
    - 对话机器人
    - 客服机器人
    - 机器人流程
