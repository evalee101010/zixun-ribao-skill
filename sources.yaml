    note: "海外 AI 创业/融资，有免费 API/MCP"
    enabled: true

  # ------------------------------------------------------------
  # 数据站（榜单/数据披露，多为 web 或 api）
  # ------------------------------------------------------------
  - name: 点点数据
    board: 泛娱乐·出海
    track: 休闲游戏
    type: api
    api_slot: "DIANDIAN_API"     # ← 点点 API 上线后在 .env 填 key，脚本读取
    note: "出海 App 下载/收入榜，预留 API 接入位"
